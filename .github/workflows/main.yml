name: deploy cricket project with cicd
on: 
   push:
       branches: ["main"]
jobs:
    deploy:
         runs-on: ubuntu-latest
         steps:
             - name: chekck out code
               uses: actions/checkout@v4
             - name: login on docker hub
               run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u ${{secrets.DOCKER_USERNAME}} --password-stdin
             - name: build docker image
               run:  docker build -t ${{secrets.DOCKER_USERNAME}}//cricket_data
             - name: push image on docker hub
               run:  docker push ${{secrets.DOCKER_USERNAME}}//cricket_data
               
              
