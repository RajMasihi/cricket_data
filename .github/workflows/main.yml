name: deploy cricket project with cicd

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cricket_data:latest .

      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cricket_data

      - name: Copy docker-compose and Deploy to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          scp -i key.pem -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ubuntu@${{ secrets.EC2_IP }}:/home/ubuntu/docker-compose.yml
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_IP }} << 'EOF'
            cat > /home/ubuntu/.env << ENVEOF
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          API_KEY=${{secrets.API_KEY}}
          ENVEOF
            cd /home/ubuntu
            docker-compose pull
            docker-compose down
            docker-compose up -d
            docker image prune -f
          EOF
          rm -f key.pem
